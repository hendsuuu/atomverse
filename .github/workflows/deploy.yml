name: Deploy to Shared Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: atomverse

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── PHP & Composer ──
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, json, bcmath, pdo_mysql, gd, curl, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # ── Node.js & Frontend Build ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: npx vite build

      # ── Prepare deployment package ──
      - name: Prepare files for deployment
        run: |
          # Remove files not needed in production
          rm -rf node_modules
          rm -rf tests
          rm -rf .git
          rm -rf .github
          rm -rf storage/logs/*.log

      # ── Verify secrets are available ──
      - name: Verify deployment secrets
        run: |
          if [ -z "${{ secrets.FTP_HOST }}" ]; then
            echo "::error::FTP_HOST secret is not set in the 'atomverse' environment"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "::error::FTP_USERNAME secret is not set in the 'atomverse' environment"
            exit 1
          fi
          echo "All required secrets are available"

      # ── Deploy via FTP ──
      - name: Deploy to shared hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env
            **/.env.backup
            **/storage/logs/**
            **/storage/framework/cache/data/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**

      # ── Post-deploy: Run migrations via SSH ──
      - name: Run post-deploy commands via SSH
        if: ${{ secrets.SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.SSH_PROJECT_DIR }}
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link
