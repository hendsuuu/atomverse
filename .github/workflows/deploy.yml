name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: atomverse
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
      SSH_PORT: ${{ secrets.SSH_PORT }}
      SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SSH_PASSPHRASE: ${{ secrets.SERVER_SSH_PASSPHRASE }}

    steps:
      - name: Connect and test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 20m
          script: |
            echo "LOGIN SUCCESS"
            pwd
            ls -la

            cd ~/atomverse || cd /home/${{ env.SSH_USERNAME }}/atomverse

            echo "IN PROJECT"
            pwd
            ls -la

            php -v
            composer --version
            node -v
            npm -v
      - name: Deploy (safe)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USERNAME }}
          key: ${{ env.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          passphrase: ${{ env.SSH_PASSPHRASE }}
          request_pty: true
          command_timeout: 20m
          script: |
            cd ~/atomverse || cd /home/${{ env.SSH_USERNAME }}/atomverse

            echo "PULL CODE"
            git pull origin main

            echo "COMPOSER INSTALL"
            composer install --no-dev --optimize-autoloader

            echo "MIGRATE"
            php artisan migrate --force

            echo "OPTIMIZE"
            php artisan optimize